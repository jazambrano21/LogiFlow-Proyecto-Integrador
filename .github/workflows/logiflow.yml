name: CI Pipeline - Fase 1

on:
  push:
    branches: [main, development]
    paths:
      - 'Backend/ms-flota/**'
      - 'Backend/ms-taller/**'
      - '.github/workflows/logiflow.yml'
      - 'sonar-project.properties'
      - 'README.md'
      - 'docs/**'
  pull_request:
    branches: [main, development]
    paths:
      - 'Backend/ms-flota/**'
      - 'Backend/ms-taller/**'
      - '.github/workflows/logiflow.yml'
      - 'sonar-project.properties'
      - 'README.md'
      - 'docs/**'

permissions:
  contents: read

jobs:
  build_test:
    name: Build y test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ✅ ms-flota → MySQL puerto 3307
          - service: ms-flota
            db_service: mysql-flota
            db_port: 3307
            db_name: ms_flota_db
            datasource_url: jdbc:mysql://localhost:3307/ms_flota_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

          # ✅ ms-taller → MySQL puerto 3309
          - service: ms-taller
            db_service: mysql-taller
            db_port: 3309
            db_name: logiflow_taller
            datasource_url: jdbc:mysql://localhost:3309/logiflow_taller?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # ✅ Solo levanta la BD, no la app
      - name: Levantar base de datos MySQL
        working-directory: Backend/${{ matrix.service }}
        run: docker compose up -d ${{ matrix.db_service }}

      # ✅ Espera que MySQL esté healthy
      - name: Esperar que MySQL esté listo
        working-directory: Backend/${{ matrix.service }}
        run: |
          echo "Esperando MySQL en puerto ${{ matrix.db_port }}..."
          for i in {1..30}; do
            docker compose ps ${{ matrix.db_service }} | grep "healthy" && echo "✅ MySQL listo" && break
            echo "Intento $i/30..."
            sleep 5
          done

      - name: Dar permisos a Maven Wrapper
        working-directory: Backend/${{ matrix.service }}
        run: chmod +x mvnw

      # ✅ Tests apuntando a la BD dockerizada
      - name: Compilar y ejecutar pruebas
        working-directory: Backend/${{ matrix.service }}
        run: ./mvnw -B clean verify
        env:
          SPRING_DATASOURCE_URL: ${{ matrix.datasource_url }}
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver

      - name: Bajar containers
        if: always()
        working-directory: Backend/${{ matrix.service }}
        run: docker compose down -v

  sonar:
    name: Analisis Sonar
    runs-on: ubuntu-latest
    needs: build_test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # ✅ Levantar ambas BDs MySQL
      - name: Levantar BD ms-flota
        working-directory: Backend/ms-flota
        run: docker compose up -d mysql-flota

      - name: Levantar BD ms-taller
        working-directory: Backend/ms-taller
        run: docker compose up -d mysql-taller

      - name: Esperar BDs MySQL
        run: |
          echo "Esperando ambas BDs..."
          sleep 30

      - name: Dar permisos Maven Wrapper
        run: |
          chmod +x Backend/ms-flota/mvnw
          chmod +x Backend/ms-taller/mvnw

      # ✅ Generar binarios con ambas BDs disponibles
      - name: Generar binarios para Sonar
        run: |
          cd Backend/ms-flota
          ./mvnw -B clean verify \
            -Dspring.datasource.url="jdbc:mysql://localhost:3307/ms_flota_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true" \
            -Dspring.datasource.username=root \
            -Dspring.datasource.password=root \
            -Dspring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver \
            -Dspring.jpa.hibernate.ddl-auto=create-drop

          cd ../ms-taller
          ./mvnw -B clean verify \
            -Dspring.datasource.url="jdbc:mysql://localhost:3309/logiflow_taller?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true" \
            -Dspring.datasource.username=root \
            -Dspring.datasource.password=root \
            -Dspring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver \
            -Dspring.jpa.hibernate.ddl-auto=create-drop

      - name: Analizar en SonarCloud
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Bajar containers
        if: always()
        run: |
          docker compose -f Backend/ms-flota/docker-compose.yml down -v
          docker compose -f Backend/ms-taller/docker-compose.yml down -v

      - name: Notificar éxito en Telegram
        if: success()
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "text": "✅ LogiFlow CI Exitoso\n\n📊 SonarCloud: https://sonarcloud.io/project/overview?id=jazambrano21_LogiFlow-Main\n🔗 Pipeline: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

      - name: Notificar fallo en Telegram
        if: failure()
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "text": "❌ LogiFlow CI Falló\n\n🔗 Pipeline: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'