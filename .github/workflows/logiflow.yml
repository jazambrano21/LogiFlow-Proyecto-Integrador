name: CI Pipeline - Fase 1

on:
  push:
    branches: [main, development]
    paths:
      - 'Backend/ms-flota/**'
      - 'Backend/ms-taller/**'
      - '.github/workflows/logiflow.yml'
      - 'sonar-project.properties'
      - 'README.md'
      - 'docs/**'
  pull_request:
    branches: [main, development]
    paths:
      - 'Backend/ms-flota/**'
      - 'Backend/ms-taller/**'
      - '.github/workflows/logiflow.yml'
      - 'sonar-project.properties'
      - 'README.md'
      - 'docs/**'

permissions:
  contents: read

jobs:
  build_test:
    name: Build y test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ms-flota, ms-taller]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Dar permisos a Maven Wrapper
        working-directory: Backend/${{ matrix.service }}
        run: chmod +x mvnw

      - name: Compilar y ejecutar pruebas
        working-directory: Backend/${{ matrix.service }}
        run: ./mvnw -B clean verify

  sonar:
    name: Analisis Sonar
    runs-on: ubuntu-latest
    needs: build_test
    outputs:
      summary: ${{ steps.metrics.outputs.summary }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Dar permisos a Maven Wrapper de ms-flota
        working-directory: Backend/ms-flota
        run: chmod +x mvnw

      - name: Dar permisos a Maven Wrapper de ms-taller
        working-directory: Backend/ms-taller
        run: chmod +x mvnw

      - name: Generar binarios y reportes para Sonar
        run: |
          cd Backend/ms-flota
          ./mvnw -B clean verify
          cd ../ms-taller
          ./mvnw -B clean verify
        shell: bash

      - name: Analizar proyecto en Sonar
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Obtener resumen de Sonar
        id: metrics
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          response=$(curl -s -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/measures/component?component=jazambrano21_LogiFlow-Proyecto-Integrador&metricKeys=alert_status,bugs,vulnerabilities,code_smells,coverage" || true)
          export SONAR_RESPONSE="$response"
          summary=$(python - <<'PY'
          import json, os
          raw = os.environ.get("SONAR_RESPONSE", "").strip()
          if not raw:
              print("Sonar | quality=N/D | bugs=N/D | vulns=N/D | smells=N/D | coverage=N/D")
          else:
              try:
                  data = json.loads(raw)
                  measures = {m["metric"]: m["value"] for m in data.get("component", {}).get("measures", [])}
                  print(
                      "Sonar | quality={quality} | bugs={bugs} | vulns={vulns} | smells={smells} | coverage={coverage}".format(
                          quality=measures.get("alert_status", "N/D"),
                          bugs=measures.get("bugs", "N/D"),
                          vulns=measures.get("vulnerabilities", "N/D"),
                          smells=measures.get("code_smells", "N/D"),
                          coverage=(measures.get("coverage", "N/D") + "%") if measures.get("coverage") else "N/D",
                      )
                  )
              except Exception:
                  print("Sonar | quality=N/D | bugs=N/D | vulns=N/D | smells=N/D | coverage=N/D")
          PY
          )
          echo "summary=${summary}" >> "$GITHUB_OUTPUT"
        shell: bash

  notify:
    name: Notificar a Telegram
    runs-on: ubuntu-latest
    needs: [build_test, sonar]
    if: always()
    steps:
      - name: Construir mensaje
        id: message
        run: |
          if [ "${{ needs.build_test.result }}" = "success" ] && [ "${{ needs.sonar.result }}" = "success" ]; then
            status="✅ CI exitoso"
          else
            status="❌ CI con fallos"
          fi
          sonar_summary="${{ needs.sonar.outputs.summary }}"
          if [ -z "$sonar_summary" ]; then
            sonar_summary="Sonar | quality=N/D | bugs=N/D | vulns=N/D | smells=N/D | coverage=N/D"
          fi
          {
            echo "text<<EOF"
            echo "${status}"
            echo ""
            echo "Proyecto: LogiFlow Fase 1"
            echo "Rama: ${{ github.ref_name }}"
            echo "Evento: ${{ github.event_name }}"
            echo "Build/Test: ${{ needs.build_test.result }}"
            echo "Sonar: ${{ needs.sonar.result }}"
            echo "${sonar_summary}"
            echo "Pipeline: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Commit: ${{ github.sha }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Enviar Telegram
        continue-on-error: true
        run: |
          payload=$(python - <<'PY'
          import json, os
          print(json.dumps({
              "chat_id": os.environ["TELEGRAM_CHAT_ID"],
              "text": os.environ["MESSAGE"]
          }))
          PY
          )
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$payload"
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE: ${{ steps.message.outputs.text }}
