services:
  mysql-seguimiento:
    image: mysql:8.0
    container_name: mysql_seguimiento
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: logiflow_seguimiento
    ports:
      - "3308:3306"
    volumes:
      - mysql_seguimiento_data:/var/lib/mysql

volumes:
  mysql_seguimiento_data:
