services:
  mysql-flota:
    image: mysql:8.0
    container_name: mysql_flota
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_flota_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_flota_data:/var/lib/mysql
    networks:
      - flota-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  ms-flota:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-flota
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-flota:3306/ms_flota_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      mysql-flota:
        condition: service_healthy
    networks:
      - flota-network

volumes:
  mysql_flota_data:

networks:
  flota-network:
    driver: bridge