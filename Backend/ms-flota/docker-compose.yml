version: "3.8"

services:
  db:
    image: postgres:15
    container_name: ms_flota_db
    environment:
      POSTGRES_DB: ms_flota_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
    volumes:
      - ms_flota_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ms_flota_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ms-flota:latest
    container_name: ms-flota
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ms_flota_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345678
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SPRING_JPA_SHOW_SQL: "true"
    ports:
      - "8080:8080"
    restart: on-failure

volumes:
  ms_flota_db_data:
