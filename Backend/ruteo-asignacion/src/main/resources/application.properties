spring.application.name=ruteo-asignacion
server.port=8085

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/logiflow_ruteo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Guayaquil&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
